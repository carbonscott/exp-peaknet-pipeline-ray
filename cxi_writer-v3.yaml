# CXI Writer Configuration for $TEST_DIR
# Consumes from Q2 queue produced by peaknet-socket-profile-673m-with-output-v3.yaml
#
# CRITICAL: These settings MUST match the pipeline config
#
# NEW: Supports preprocessing metadata from Cheetah/CrystFEL integration
# REQUIRES: Pipeline config must include 'detector_data_original_shape' field
#           (See: peaknet-with-cheetah-integration.yaml for reference)

# ============================================================
# Ray Configuration (MUST MATCH PIPELINE)
# ============================================================
ray:
  namespace: "peaknet-pipeline"  # MATCHES: pipeline config line 114

# ============================================================
# Input Queue Configuration (MUST MATCH PIPELINE'S output_queue)
# ============================================================
queue:
  name: "peaknet_q2"              # MATCHES: pipeline config line 50
  num_shards: 8                   # MATCHES: pipeline config line 45
  maxsize_per_shard: 1600         # MATCHES: pipeline config line 46
  poll_timeout: 0.01              # Polling interval (seconds)

# ============================================================
# CPU Post-Processing Configuration
# ============================================================
processing:
  num_cpu_workers: 32             # Parallel Ray tasks for peak finding
  max_pending_tasks: 100          # Backpressure limit (prevents OOM)

# ============================================================
# Peak Finding Configuration
# ============================================================
peak_finding:
  min_num_peak: 10                # Minimum peaks to save event (quality filter)
  max_num_peak: 2048              # Maximum peaks per event (CXI array size)
  connectivity: 8                 # 8-connectivity for connected components

# ============================================================
# Preprocessing Metadata Support (NEW - Cheetah/CrystFEL Integration)
# ============================================================
# The writer now supports detector image reconstruction when preprocessing
# is done upstream (e.g., in lclstreamer).
#
# How it works:
#   1. If PipelineOutput contains preprocessing_metadata:
#      - Detector images are reconstructed: (B*C, 1, H, W) → (B, C, H_orig, W_orig)
#      - Peaks are grouped by events using unpacking: b = idx // C, p = idx % C
#      - Panel indices are preserved for CheetahConverter
#
#   2. Physics metadata conversion:
#      - photon_wavelength (Å) → photon_energy (eV) via E = 12398.4193/λ
#      - timestamp is extracted and written to /LCLS/detector_1/timestamp
#
#   3. Peak coordinates:
#      - Used as-is (no transformation needed for bottom-right padding)
#      - CheetahConverter handles panel-local → assembled detector conversion
#
#   4. Backward compatibility:
#      - If no preprocessing_metadata, images used as-is
#      - Falls back to original behavior for non-preprocessed data
#
# Data flow:
#   lclstreamer (preprocessing) → Q1 → P → Q2
#       ↓
#   This writer: reconstruct detector images → find peaks → write CXI
#
# REQUIREMENTS for preprocessing metadata support:
#   - Pipeline config MUST include: detector_data_original_shape in fields
#   - lclstreamer MUST provide this field in .npz data
#   - See: $PIPELINE_DEV_DIR/PREPROCESSING-INTEGRATION.md for details
#
# Example pipeline fields config:
#   fields:
#     detector_data: "detector_data"
#     timestamp: "timestamp"
#     photon_wavelength: "photon_wavelength"
#     detector_data_original_shape: "detector_data_original_shape"  # REQUIRED!

# ============================================================
# Geometry and Coordinate Conversion
# ============================================================
geometry:
  geom_file: geom/mfxl1047723.geom.stream                 # Path to CrystFEL geometry file for CheetahConverter
                                  # Set to null to skip coordinate conversion
                                  # Example: /sdf/data/lcls/ds/prj/prjcwang31/results/geometry/cxi_detector.geom
                                  #
                                  # NOTE: CheetahConverter is RECOMMENDED when using preprocessing metadata
                                  # to convert panel-local coordinates to assembled detector coordinates.
                                  # Without it, peaks will be in panel-local format.

# ============================================================
# CXI Output Configuration
# ============================================================
output:
  output_dir: "/sdf/data/lcls/ds/prj/prjcwang31/results/proj-stream-to-ml/peaknet_673m_results"
  file_prefix: "mfxl1047723"      # Filename prefix
  buffer_size: 32                # Events to buffer before writing CXI file
  create_output_dir: true         # Auto-create output directory

# ============================================================
# System Configuration
# ============================================================
system:
  log_level: "INFO"               # DEBUG, INFO, WARNING, ERROR
  log_file: null                  # null = stdout only
  progress_interval: 50           # Log progress every N batches

# ============================================================
# Usage:
# ============================================================
# cd /sdf/data/lcls/ds/prj/prjcwang31/results/proj-stream-to-ml
# cxi-writer --config cxi_writer.yaml
