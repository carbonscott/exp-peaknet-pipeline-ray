# CXI Writer Configuration
# Consumes from Q2 queue produced by peaknet pipeline

ray:
  namespace: "peaknet-pipeline"

queue:
  name: "peaknet_q2"
  num_shards: 8
  maxsize_per_shard: 1600
  poll_timeout: 0.01

processing:
  # num_cpu_workers: Axis-1 peak-finding parallelism inside the coordinator.
  # Value backed by docs/benchmarks/summary.md on feat/fix-bottleneck of
  # carbonscott/cxi-pipeline-ray (PR #5). Effective ceiling is
  # min(K, num_panels); current pipeline produces 4 panels per batch
  # (B=1, C=4), so 4 is the observed optimum on sdfada002 (96 CPUs).
  # Setting K>4 reserves CPUs without adding throughput.
  num_cpu_workers: 4
  max_pending_tasks: 100

peak_finding:
  min_num_peak: 10
  max_num_peak: 2048
  connectivity: 8

geometry:
  geom_file: null

output:
  output_dir: "./cxi_output"
  file_prefix: "mfxl1038923-r0278"
  buffer_size: 32
  create_output_dir: true

system:
  log_level: "INFO"
  log_file: null
  progress_interval: 50
